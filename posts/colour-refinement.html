<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colour Refinement</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #e5e5e5;
      --link: #111111;
      --max-width: 760px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", Times, serif;
      line-height: 1.7;
      font-size: 18px;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    h1, h2 {
      font-weight: 500;
      line-height: 1.2;
      margin: 0 0 16px 0;
    }

    h1 { font-size: 2.4rem; }

    h2 {
      font-size: 1.4rem;
      margin-top: 48px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    p { margin: 0 0 18px 0; }

    a {
      color: var(--link);
      text-decoration: underline;
    }

    button {
      margin-right: 8px;
      padding: 6px 10px;
      font-family: inherit;
      cursor: pointer;
    }
  </style>

  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body>
  <main class="container">

    <h1>Colour Refinement</h1>

    <h2>Algorithm</h2>

    <p><b>Initialization:</b> all vertices receive the same colour.</p>
    <p><b>Refinement:</b> vertices get different colours if their neighbourhoods differ.</p>
    <p>The process repeats until stable.</p>

    <h2>Interactive Demo</h2>

    <div id="wl-demo"></div>

    <script src="../assets/wl-demo.js"></script>

  </main>
</body>
</html>
